name: Build SiteLedger APK v1.4

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Extract source
        run: |
          rm -rf project && mkdir project
          unzip -q SiteLedger_Android_Source_v1.4.zip -d project
          grep -q '"version": "1.4.0"' project/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: project/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - name: Install SDK
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"
      - name: Install and sync
        working-directory: project
        run: |
          npm ci
          npx cap sync android
          grep -q 'v1.4' android/app/src/main/assets/public/index.html
      - name: Build APK
        working-directory: project/android
        run: chmod +x gradlew && ./gradlew assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: SiteLedger-v1.4-debug-apk
          path: project/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
