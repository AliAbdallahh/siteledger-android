name: Build SiteLedger APK v1.1

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Extract SiteLedger v1.1 source
        run: |
          rm -rf project
          mkdir -p project
          unzip -q SiteLedger_Android_Source_v1.1.zip -d project
          test -f project/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: project/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies and sync Android
        working-directory: project
        run: |
          npm ci
          npx cap sync android

      - name: Build debug APK
        working-directory: project/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: SiteLedger-v1.1-debug-apk
          path: project/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
